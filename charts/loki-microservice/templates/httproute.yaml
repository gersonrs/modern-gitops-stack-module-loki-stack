{{- if .Values.httproute.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki-frontend
spec:
  parentRefs:
    - name: {{ .Values.httproute.gateway_name | default "istio-gateway" }}
      namespace: {{ .Values.httproute.gateway_namespace | default "istio-ingress" }}
      sectionName: https
  hostnames:
    - {{ .Values.httproute.host | quote }}
  rules:
    - backendRefs:
        - name: {{ .Values.httproute.service_name | default "loki-query-frontend" }}
          port: 3100
{{- end }}
